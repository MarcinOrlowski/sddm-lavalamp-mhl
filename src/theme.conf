[General]
# Lavalamp Theme Configuration

# Theme Selection
# Available themes: heat, ocean, forest, sunset, neon, arctic, citrus, crimson
# Comment out to get randomly choose theme
theme=

# Number of orbs (metaballs) to render (16-70, default: 35)
orbs=

# ---[ DO NOT EDIT BELOW THIS LINE OR SMALL KITTENS WILL DIE! ]----
# Theme version (auto-injected from metadata.desktop during build)
version=2.1.0
