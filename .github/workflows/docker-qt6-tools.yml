##################################################################################
#
# Builds and publishes the qt6-tools Docker image to GHCR
#
# Author: Marcin Orlowski <mail (#) marcinOrlowski (.) com>
#
##################################################################################

name: "Docker: qt6-tools"

on:
  push:
    branches: [ master, dev ]
    paths:
      - '.github/docker/qt6-tools/**'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/qt6-tools

jobs:
  build-and-push:
    name: "Build and push qt6-tools image"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: "Checkout repository…"
        uses: actions/checkout@v4

      - name: "Log in to GHCR…"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and push image…"
        uses: docker/build-push-action@v6
        with:
          context: .github/docker/qt6-tools
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
